[settings]
always_keep_download = false
always_keep_install = false
color = false
color_theme = "base16"
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]
lockfile = true
env_cache = true
http_retries = 3
disable_backends = ["asdf"]
lockfile_platforms = ["macos-arm64"]
minimum_release_age = "7d"
minimum_release_age_excludes = [
  "gem:nvim-control",
  "node",
  "npm:@ampcode/cli",
  "npm:@anthropic-ai/claude-code",
  "npm:@openai/codex",
  "npm:@typescript/native-preview",
]

[tools]
"aqua:ajeetdsouza/zoxide" = "latest"
"aqua:artempyanykh/marksman" = "latest"
"aqua:Automattic/harper/harper-ls" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:charmbracelet/glow" = "latest"
"aqua:cli/cli" = "latest"
"aqua:dandavison/delta" = "latest"
"aqua:hadolint/hadolint" = "latest"
"aqua:ip7z/7zip" = "latest"
"aqua:jgm/pandoc" = "latest"
"aqua:jj-vcs/jj" = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"aqua:jqlang/jq" = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:Kitware/CMake" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:LuaLS/lua-language-server" = "latest"
"aqua:mas-cli/mas" = "6.0.0"
"aqua:mikefarah/yq" = "latest"
"aqua:pypa/pipx" = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:superfly/flyctl" = "latest"
"aqua:tree-sitter/tree-sitter" = "latest"
"aqua:watchexec/watchexec" = "latest"
"conda:luarocks" = "latest"
"conda:pkgconf" = "latest"
"conda:tig" = "latest"
"gem:create-ruby-app" = "latest"
"gem:nvim-control" = "latest"
"github:atanunq/viu" = { version = "latest", bin = "viu" }
"github:containers/podman" = "latest"
"github:elixir-lsp/elixir-ls" = { version = "latest", exe = "language_server.sh" }
"github:mattn/efm-langserver" = "latest"
"github:mvdan/sh" = { version = "latest", bin = "shfmt" }
"github:peteretelej/tree" = "latest"
"github:sst/opencode" = { version = "latest", no_app = true }
"github:tekumara/typos-lsp" = "latest"
"github:tmux/tmux-builds" = "latest"
"github:wez/atomicparsley" = { version = "latest", asset_pattern = "AtomicParsleyMacOS.zip" }
"github:WhatsApp/erlang-language-platform" = "latest"
"github:yt-dlp/yt-dlp" = "latest"
"npm:@ampcode/cli" = { version = "latest", postinstall = "mise x node -- node \"$MISE_TOOL_INSTALL_PATH/lib/node_modules/@ampcode/cli/install.cjs\"" }
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@openai/codex" = "latest"
"npm:@typescript/native-preview" = "7.0.0-dev.20260309.1"
"npm:alex" = "latest"
"npm:bash-language-server" = "latest"
"npm:diff-so-fancy" = "latest"
"npm:graphql-language-service-cli" = "latest"
"npm:trash-cli" = "latest"
"npm:typescript" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"pipx:yamllint" = "latest"
bun = "latest"
elixir = "latest"
erlang = "latest"
neovim = "latest"
node = { version = "25.8.0", postinstall = "npm install -g corepack && corepack enable" }
python = "latest"
ruby = "latest"
rust = "latest"
zig = "latest"
